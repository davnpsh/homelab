- name: Create dashboard config directory
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/services/dashboard"
    state: directory
    mode: "0755"

- name: Render dashboard config from template
  ansible.builtin.template:
    src: dashboard/config.j2
    dest: "{{ ansible_facts.user_dir }}/services/dashboard/config.yml"
    mode: "0644"
